# ===================================================================
#  PICOM CONFIG - Enhanced with transparency & aesthetics
# ===================================================================

# --- Backend Settings ---
backend = "glx";
vsync = true;
refresh-rate = 0;  # Auto-detect refresh rate

# Modern performance tweaks
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
glx-swap-method = -1;  # Let picom decide

# --- Fading Animations ---
fading = true;
fade-in-step = 0.025;   # Slightly slower for smoothness
fade-out-step = 0.025;
fade-delta = 5;
fade-exclude = [];      # Explicitly empty to fade everything

# --- Transparency & Opacity ---
# Explicit inactive window transparency
inactive-opacity = 0.65;      # More visible inactive windows
inactive-opacity-override = true;
active-opacity = 1.0;
inactive-dim = 0.2;           # Darken inactive windows slightly
inactive-dim-fixed = false;


# --- Shadows ---
shadow = true;
shadow-radius = 15;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.6;
shadow-color = "#000000";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'"
];

# --- Blur ---
blur: {
  method = "kernel";
  strength = 7;           # Increased blur strength
  background = true;
  background-frame = false;
  background-fixed = false;
  kern = "11x11gaussian";
}

# --- Corners ---
corner-radius = 12;
# Exclude fullscreen and dock windows from rounding
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'notification'",
  "fullscreen"
];

# --- General Detection ---
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
detect-titlebar-visibility = true;

# --- Window Focus ---
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Rofi'",
  "window_type = 'notification'",
  "window_type = 'menu'",
  "window_type = 'dock'",
  "window_type = 'toolbar'"
];

# --- Animation & Transition ---
transition-length = 200;    # Smooth transitions (ms)
transition-pow-x = 0.1;
transition-pow-y = 0.1;
